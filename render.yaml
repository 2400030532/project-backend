databases:
  - name: easyintern-db
    plan: free
    region: oregon
    ipAllowList: []
    databaseName: easyintern
    user: easyintern_user
    postgresMajorVersion: "15"

services:
  - type: web
    name: easyintern-api
    env: java
    plan: free
    region: oregon
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/easyintern-api-1.0.0.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: easyintern-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: easyintern-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: easyintern-db
          property: password
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://project-frontend.onrender.com,http://localhost:5173